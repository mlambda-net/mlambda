name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Restore dependencies
        run: dotnet restore MLambda.sln

      - name: Build
        run: dotnet build MLambda.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test MLambda.sln --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"
